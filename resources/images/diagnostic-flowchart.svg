<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="700" fill="#ffffff"/>
  <text x="500" y="36" text-anchor="middle" font-size="25" font-weight="bold" fill="#0f172a">Hardware or Software? — triage flowchart</text>

  <!-- Phone arrives -->
  <rect x="60" y="58" width="340" height="44" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <text x="230" y="86" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Phone arrives</text>
  <path d="M230 102 L230 112" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Ask -->
  <rect x="60" y="118" width="340" height="44" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <text x="230" y="146" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Ask: what happened right before?</text>
  <path d="M230 162 L230 172" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- Diamond: Powers on? -->
  <polygon points="230,178 380,222 230,266 80,222" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="230" y="228" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Powers on?</text>
  <path d="M380 222 L552 222" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <text x="462" y="212" text-anchor="middle" font-size="15" font-weight="bold" fill="#b91c1c">No</text>
  <rect x="560" y="196" width="390" height="52" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="755" y="217" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">No power → check battery / charging chain</text>
  <text x="755" y="237" text-anchor="middle" font-size="14" fill="#334155">(→ Module 5)</text>
  <path d="M230 266 L230 276" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <text x="248" y="280" font-size="14" font-weight="bold" fill="#15803d">Yes</text>

  <!-- Diamond: Boots to home screen? -->
  <polygon points="230,282 385,326 230,370 75,326" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="230" y="332" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Boots to home screen?</text>
  <path d="M385 326 L552 326" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <text x="468" y="316" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">No / boot-loop</text>
  <rect x="560" y="304" width="390" height="44" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="755" y="331" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Try recovery-mode restore</text>
  <path d="M755 348 L755 358" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <rect x="560" y="362" width="390" height="38" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="755" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Still fails = hardware fault</text>
  <path d="M230 370 L230 380" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <text x="248" y="384" font-size="14" font-weight="bold" fill="#15803d">Yes</text>

  <!-- Diamond: Problem in safe mode too? -->
  <polygon points="230,386 390,430 230,474 70,430" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="230" y="436" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Problem in safe mode too?</text>
  <path d="M390 430 L552 430" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <text x="468" y="420" text-anchor="middle" font-size="15" font-weight="bold" fill="#b91c1c">No</text>
  <rect x="560" y="410" width="390" height="42" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="755" y="436" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Third-party app is the culprit — clean it up</text>
  <path d="M230 474 L230 484" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <text x="248" y="488" font-size="14" font-weight="bold" fill="#15803d">Yes</text>

  <!-- Test hardware -->
  <rect x="60" y="490" width="340" height="44" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="230" y="518" text-anchor="middle" font-size="15" font-weight="bold" fill="#0f172a">Test hardware with diagnostics menu</text>
  <path d="M150 534 L150 554" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M310 534 L310 554" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="60" y="560" width="170" height="46" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="145" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Hardware repair path</text>
  <rect x="240" y="560" width="170" height="46" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="325" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Software fix path</text>

  <!-- footer -->
  <rect x="60" y="632" width="880" height="52" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
  <text x="500" y="665" text-anchor="middle" font-size="18" font-weight="bold" fill="#854d0e">ALWAYS back up before destructive steps</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
