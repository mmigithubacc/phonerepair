<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="440" fill="#ffffff"/>
  <text x="500" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a">Professional Repair Workflow — six stages</text>

  <!-- 1. Intake -->
  <rect x="25" y="100" width="130" height="140" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <circle cx="90" cy="132" r="17" fill="#0284c7"/>
  <text x="90" y="138" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">1</text>
  <text x="90" y="182" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Intake</text>
  <text x="90" y="264" text-anchor="middle" font-size="13" fill="#334155">form + photos of</text>
  <text x="90" y="281" text-anchor="middle" font-size="13" fill="#334155">pre-existing damage</text>

  <path d="M155 170 L185 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 2. Diagnose -->
  <rect x="190" y="100" width="130" height="140" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="255" cy="132" r="17" fill="#ca8a04"/>
  <text x="255" y="138" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">2</text>
  <text x="255" y="182" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Diagnose</text>
  <text x="255" y="264" text-anchor="middle" font-size="13" fill="#334155">state your</text>
  <text x="255" y="281" text-anchor="middle" font-size="13" fill="#334155">diagnostic-fee policy</text>

  <path d="M320 170 L350 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 3. Quote & approval -->
  <rect x="355" y="100" width="130" height="140" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <circle cx="420" cy="132" r="17" fill="#ea580c"/>
  <text x="420" y="138" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">3</text>
  <text x="420" y="176" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Quote &amp;</text>
  <text x="420" y="196" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">approval</text>
  <text x="420" y="264" text-anchor="middle" font-size="13" fill="#334155">no work before the</text>
  <text x="420" y="281" text-anchor="middle" font-size="13" fill="#334155">customer says yes</text>

  <path d="M485 170 L515 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 4. Repair -->
  <rect x="520" y="100" width="130" height="140" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="585" cy="132" r="17" fill="#dc2626"/>
  <text x="585" y="138" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">4</text>
  <text x="585" y="182" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Repair</text>
  <text x="585" y="264" text-anchor="middle" font-size="13" fill="#334155">ESD-safe, right parts,</text>
  <text x="585" y="281" text-anchor="middle" font-size="13" fill="#334155">right procedure</text>

  <path d="M650 170 L680 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 5. QC -->
  <rect x="685" y="100" width="130" height="140" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <circle cx="750" cy="132" r="17" fill="#ca8a04"/>
  <text x="750" y="138" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">5</text>
  <text x="750" y="182" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">QC</text>
  <text x="750" y="264" text-anchor="middle" font-size="13" fill="#334155">full test checklist</text>
  <text x="750" y="281" text-anchor="middle" font-size="13" fill="#334155">before hand-back</text>

  <path d="M815 170 L845 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 6. Return & warranty -->
  <rect x="850" y="100" width="130" height="140" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <circle cx="915" cy="132" r="17" fill="#16a34a"/>
  <text x="915" y="138" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">6</text>
  <text x="915" y="176" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Return &amp;</text>
  <text x="915" y="196" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">warranty</text>
  <text x="915" y="264" text-anchor="middle" font-size="13" fill="#334155">log the repair,</text>
  <text x="915" y="281" text-anchor="middle" font-size="13" fill="#334155">set warranty terms</text>

  <!-- footer -->
  <rect x="30" y="330" width="940" height="60" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="367" text-anchor="middle" font-size="19" font-weight="bold" fill="#14532d">Paperwork protects you as much as the customer</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
