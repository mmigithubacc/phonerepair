<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="470" fill="#ffffff"/>
  <text x="500" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a">The Charging Chain — follow the power</text>

  <!-- 1. wall charger -->
  <rect x="25" y="130" width="125" height="80" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <text x="87" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">wall</text>
  <text x="87" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">charger</text>
  <text x="87" y="245" text-anchor="middle" font-size="14" fill="#b91c1c">broken adapter</text>

  <path d="M150 170 L185 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 2. USB cable -->
  <rect x="190" y="130" width="125" height="80" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <text x="252" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">USB</text>
  <text x="252" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">cable</text>
  <text x="252" y="245" text-anchor="middle" font-size="14" fill="#b91c1c">frayed cable</text>

  <path d="M315 170 L350 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 3. charging port -->
  <rect x="355" y="130" width="125" height="80" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="417" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">charging</text>
  <text x="417" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">port</text>
  <text x="417" y="245" text-anchor="middle" font-size="14" fill="#b91c1c">lint &amp; bent pins</text>

  <path d="M480 170 L515 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 4. charging IC -->
  <rect x="520" y="130" width="125" height="80" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="582" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">charging</text>
  <text x="582" y="186" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">IC</text>
  <text x="582" y="245" text-anchor="middle" font-size="14" fill="#b91c1c">board-level fault</text>

  <path d="M645 170 L680 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 5. PMIC -->
  <rect x="685" y="130" width="125" height="80" rx="12" fill="#ffedd5" stroke="#ea580c" stroke-width="2.5"/>
  <text x="747" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">PMIC</text>
  <text x="747" y="245" text-anchor="middle" font-size="14" fill="#b91c1c">board-level fault</text>

  <path d="M810 170 L845 170" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>

  <!-- 6. battery -->
  <rect x="850" y="130" width="125" height="80" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <rect x="898" y="120" width="28" height="10" rx="3" fill="#16a34a"/>
  <text x="912" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">battery</text>
  <text x="912" y="245" text-anchor="middle" font-size="14" fill="#b91c1c">worn or swollen</text>

  <!-- branch from PMIC to rest of phone -->
  <path d="M747 210 L747 285" stroke="#0f172a" stroke-width="3" marker-end="url(#arr)"/>
  <rect x="650" y="290" width="195" height="50" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <text x="747" y="321" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">rest of phone (SoC…)</text>

  <!-- caption row label -->
  <text x="500" y="280" text-anchor="middle" font-size="14" font-style="italic" fill="#64748b">↑ most common failure at each link ↑</text>

  <!-- footer -->
  <rect x="30" y="380" width="940" height="60" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="417" text-anchor="middle" font-size="17" font-weight="bold" fill="#14532d">A fault ANYWHERE in the chain looks like "won't charge" — test link by link with the USB ammeter.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
