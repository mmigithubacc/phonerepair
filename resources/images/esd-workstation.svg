<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="500" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a">ESD-Safe Workstation — one continuous path to ground</text>

  <!-- discharge path summary -->
  <rect x="30" y="70" width="940" height="46" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="500" y="99" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">Static discharge path:  ① skin  →  ② wrist strap  →  ③ coiled cord (1 MΩ)  →  ④ common ground point  →  ⑤ earth</text>

  <!-- bench -->
  <rect x="60" y="400" width="660" height="26" rx="4" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <rect x="95" y="426" width="18" height="80" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <rect x="660" y="426" width="18" height="80" fill="#cbd5e1" stroke="#64748b" stroke-width="2"/>
  <text x="90" y="452" font-size="14" fill="#334155">bench</text>

  <!-- ESD mat -->
  <rect x="90" y="372" width="480" height="28" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="100" y="362" font-size="15" font-weight="bold" fill="#0284c7">ESD mat</text>

  <!-- phone on mat -->
  <rect x="150" y="350" width="110" height="20" rx="6" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <line x1="160" y1="360" x2="250" y2="360" stroke="#475569" stroke-width="2"/>
  <text x="150" y="340" font-size="14" fill="#334155">phone</text>

  <!-- technician arm -->
  <path d="M440 175 L335 328" stroke="#fbd7b0" stroke-width="34" stroke-linecap="round" fill="none"/>
  <ellipse cx="325" cy="340" rx="26" ry="17" fill="#fbd7b0" stroke="#d6a05f" stroke-width="2"/>
  <text x="452" y="160" font-size="14" fill="#334155">technician's arm</text>

  <!-- wrist strap -->
  <line x1="384" y1="212" x2="422" y2="238" stroke="#1e40af" stroke-width="14" stroke-linecap="round"/>
  <text x="300" y="200" font-size="15" font-weight="bold" fill="#1e40af">wrist strap</text>
  <line x1="360" y1="205" x2="392" y2="220" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- coiled cord: straight lead, coil loops, straight lead to ground point -->
  <path d="M415 235 L475 272" stroke="#334155" stroke-width="3" fill="none"/>
  <circle cx="480" cy="277" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="500" cy="286" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="520" cy="294" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="540" cy="303" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="560" cy="311" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="580" cy="320" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="600" cy="328" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <circle cx="620" cy="337" r="11" fill="none" stroke="#334155" stroke-width="3"/>
  <path d="M628 344 L735 383" stroke="#334155" stroke-width="3" fill="none"/>
  <text x="640" y="290" font-size="15" font-weight="bold" fill="#334155">coiled cord —</text>
  <text x="640" y="309" font-size="15" font-weight="bold" fill="#334155">1 MΩ resistor inside</text>
  <line x1="636" y1="296" x2="602" y2="315" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- mat wire to ground point -->
  <path d="M570 386 L660 386 L730 396" stroke="#334155" stroke-width="3" fill="none"/>
  <text x="586" y="378" font-size="14" fill="#334155">mat wire</text>

  <!-- common ground point -->
  <rect x="725" y="382" width="64" height="42" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
  <text x="810" y="398" font-size="15" font-weight="bold" fill="#854d0e">common</text>
  <text x="810" y="416" font-size="15" font-weight="bold" fill="#854d0e">ground point</text>

  <!-- wire to earth ground symbol -->
  <line x1="757" y1="424" x2="757" y2="488" stroke="#334155" stroke-width="3"/>
  <line x1="722" y1="490" x2="792" y2="490" stroke="#0f172a" stroke-width="5"/>
  <line x1="734" y1="502" x2="780" y2="502" stroke="#0f172a" stroke-width="5"/>
  <line x1="746" y1="514" x2="768" y2="514" stroke="#0f172a" stroke-width="5"/>
  <text x="810" y="510" font-size="15" font-weight="bold" fill="#0f172a">earth ground</text>

  <!-- numbered arrows along the discharge path -->
  <path d="M330 305 L380 245" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrRed)"/>
  <path d="M450 258 L470 268" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrRed)"/>
  <path d="M660 356 L700 372" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrRed)"/>
  <path d="M757 436 L757 470" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrRed)"/>

  <circle cx="300" cy="312" r="14" fill="#dc2626"/>
  <text x="300" y="318" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">1</text>
  <text x="248" y="318" font-size="14" fill="#dc2626" font-weight="bold">skin</text>

  <circle cx="418" cy="200" r="14" fill="#dc2626"/>
  <text x="418" y="206" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">2</text>

  <circle cx="545" cy="262" r="14" fill="#dc2626"/>
  <text x="545" y="268" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">3</text>

  <circle cx="712" cy="358" r="14" fill="#dc2626"/>
  <text x="712" y="364" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">4</text>

  <circle cx="792" cy="458" r="14" fill="#dc2626"/>
  <text x="792" y="464" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">5</text>

  <!-- footer -->
  <rect x="30" y="545" width="940" height="56" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="580" text-anchor="middle" font-size="20" font-weight="bold" fill="#14532d">Everything at the same potential = no spark</text>

  <defs>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
