<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="680" fill="#ffffff"/>
  <text x="500" y="42" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a">The Standard Repair Toolkit</text>

  <!-- ================= ROW 1 ================= -->
  <!-- 1. Precision driver + bits -->
  <g>
    <rect x="25" y="70" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="140" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Precision driver + bits</text>
    <rect x="100" y="108" width="20" height="42" rx="7" fill="#475569"/>
    <rect x="107" y="150" width="6" height="40" fill="#94a3b8"/>
    <path d="M107 190 L113 190 L110 200 Z" fill="#64748b"/>
    <rect x="150" y="120" width="10" height="26" rx="2" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <rect x="170" y="120" width="10" height="26" rx="2" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <rect x="190" y="120" width="10" height="26" rx="2" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <text x="140" y="222" text-anchor="middle" font-size="13" fill="#334155">PH000 / PH00 · Pentalobe P2 / P5</text>
    <text x="140" y="242" text-anchor="middle" font-size="13" fill="#334155">Tri-point Y000 · Torx T3–T6</text>
  </g>

  <!-- 2. Suction cup -->
  <g>
    <rect x="265" y="70" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="380" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Suction cup</text>
    <path d="M346 196 a34 34 0 0 1 68 0 Z" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
    <ellipse cx="380" cy="196" rx="38" ry="8" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>
    <rect x="374" y="142" width="12" height="22" rx="4" fill="#475569"/>
    <circle cx="380" cy="132" r="10" fill="none" stroke="#475569" stroke-width="4"/>
    <text x="380" y="236" text-anchor="middle" font-size="13" fill="#334155">lifts glass to start opening</text>
  </g>

  <!-- 3. Opening picks -->
  <g>
    <rect x="505" y="70" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="620" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Opening picks</text>
    <path d="M570 200 Q568 128 596 122 Q624 128 622 200 Q596 214 570 200 Z" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
    <path d="M616 206 Q614 134 642 128 Q670 134 668 206 Q642 220 616 206 Z" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2"/>
    <text x="620" y="242" text-anchor="middle" font-size="13" fill="#334155">slide along seams to release clips</text>
  </g>

  <!-- 4. Plastic card -->
  <g>
    <rect x="745" y="70" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="860" y="96" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Plastic card</text>
    <rect x="812" y="126" width="96" height="62" rx="8" fill="#93c5fd" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="812" y="140" width="96" height="12" fill="#1d4ed8"/>
    <text x="860" y="236" text-anchor="middle" font-size="13" fill="#334155">wide, gentle separation of adhesive</text>
  </g>

  <!-- ================= ROW 2 ================= -->
  <!-- 5. Plastic spudger -->
  <g>
    <rect x="25" y="270" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="140" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Plastic spudger</text>
    <rect x="70" y="360" width="120" height="12" rx="6" fill="#334155"/>
    <path d="M190 360 L212 366 L190 372 Z" fill="#334155"/>
    <path d="M70 358 L52 366 L70 374 Z" fill="#334155"/>
    <text x="140" y="422" text-anchor="middle" font-size="13" fill="#334155">safe prying near flexes &amp; connectors</text>
  </g>

  <!-- 6. Metal spudger -->
  <g>
    <rect x="265" y="270" width="230" height="190" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="380" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Metal spudger</text>
    <rect x="315" y="362" width="120" height="8" rx="4" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <path d="M435 362 L456 366 L435 370 Z" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <path d="M315 360 L298 366 L315 372 Z" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <text x="380" y="422" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">never near battery</text>
  </g>

  <!-- 7. ESD tweezers -->
  <g>
    <rect x="505" y="270" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="620" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">ESD tweezers</text>
    <path d="M566 318 L586 400 M598 318 L586 400" stroke="#1e293b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M642 318 L656 386 Q660 402 674 396 M672 318 L660 380" stroke="#1e293b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="620" y="432" text-anchor="middle" font-size="13" fill="#334155">straight + curved, anti-static</text>
  </g>

  <!-- 8. Heat gun -->
  <g>
    <rect x="745" y="270" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="860" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Heat gun</text>
    <rect x="836" y="330" width="76" height="28" rx="10" fill="#475569"/>
    <rect x="812" y="336" width="24" height="16" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <rect x="884" y="358" width="18" height="42" rx="6" fill="#475569"/>
    <path d="M798 330 q-8 8 0 16 q8 8 0 16 M784 330 q-8 8 0 16 q8 8 0 16" stroke="#ea580c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="860" y="432" text-anchor="middle" font-size="13" fill="#334155">softens adhesive — keep it moving</text>
  </g>

  <!-- ================= ROW 3 ================= -->
  <!-- 9. Magnetic mat -->
  <g>
    <rect x="25" y="470" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="140" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Magnetic mat</text>
    <rect x="85" y="514" width="110" height="72" fill="#ffffff" stroke="#475569" stroke-width="2"/>
    <line x1="122" y1="514" x2="122" y2="586" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="158" y1="514" x2="158" y2="586" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="85" y1="538" x2="195" y2="538" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="85" y1="562" x2="195" y2="562" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="103" cy="526" r="3" fill="#475569"/>
    <circle cx="140" cy="550" r="3" fill="#475569"/>
    <text x="140" y="622" text-anchor="middle" font-size="13" fill="#334155">keeps every screw sorted by step</text>
  </g>

  <!-- 10. IPA bottle -->
  <g>
    <rect x="265" y="470" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="380" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Isopropyl alcohol</text>
    <rect x="370" y="512" width="20" height="10" fill="#475569"/>
    <rect x="373" y="522" width="14" height="12" fill="#94a3b8"/>
    <rect x="356" y="534" width="48" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <text x="380" y="570" text-anchor="middle" font-size="14" font-weight="bold" fill="#0284c7">≥99%</text>
    <text x="380" y="622" text-anchor="middle" font-size="13" fill="#334155">cleaning boards — evaporates clean</text>
  </g>

  <!-- 11. Multimeter -->
  <g>
    <rect x="505" y="470" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="620" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Multimeter</text>
    <rect x="586" y="510" width="68" height="92" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2.5"/>
    <rect x="594" y="518" width="52" height="22" rx="3" fill="#0f172a"/>
    <text x="620" y="534" text-anchor="middle" font-size="12" fill="#4ade80" font-family="monospace">3.82</text>
    <circle cx="620" cy="570" r="16" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
    <line x1="620" y1="570" x2="630" y2="558" stroke="#475569" stroke-width="3"/>
    <path d="M592 602 Q560 622 552 636" stroke="#dc2626" stroke-width="3" fill="none"/>
    <path d="M648 602 Q680 622 688 636" stroke="#0f172a" stroke-width="3" fill="none"/>
    <text x="620" y="652" text-anchor="middle" font-size="13" fill="#334155">voltage · continuity · resistance</text>
  </g>

  <!-- 12. USB ammeter -->
  <g>
    <rect x="745" y="470" width="230" height="190" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="860" y="496" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">USB ammeter</text>
    <rect x="812" y="536" width="80" height="42" rx="6" fill="#475569"/>
    <rect x="820" y="544" width="64" height="26" rx="3" fill="#0f172a"/>
    <text x="852" y="562" text-anchor="middle" font-size="12" fill="#4ade80" font-family="monospace">5.1V 0.9A</text>
    <rect x="892" y="546" width="20" height="22" fill="#94a3b8" stroke="#475569" stroke-width="1.5"/>
    <rect x="792" y="550" width="20" height="14" fill="#cbd5e1" stroke="#475569" stroke-width="1.5"/>
    <text x="860" y="622" text-anchor="middle" font-size="13" fill="#334155">inline charge-current readout</text>
  </g>
</svg>
