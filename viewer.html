<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">

<title>Course Document</title>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--accent:#38bdf8;--warn:#f59e0b}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;line-height:1.6}
  nav{position:sticky;top:0;background:rgba(15,23,42,.95);border-bottom:1px solid #334155;
    padding:.7rem 1.2rem;display:flex;gap:1rem;align-items:center;z-index:5}
  nav a{color:var(--accent);text-decoration:none;font-size:.95rem}
  nav span{color:var(--muted);font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  main{max-width:900px;margin:0 auto;padding:2rem 1.2rem 5rem}
  main h1{color:var(--accent);line-height:1.2}
  main h2{color:var(--accent);margin-top:2.2rem;border-bottom:1px solid #334155;padding-bottom:.3rem}
  main h3{color:var(--warn)}
  main a{color:var(--accent)}
  main code{background:var(--panel);border-radius:4px;padding:.1rem .4rem;font-size:.92em}
  main pre{background:var(--panel);padding:1rem;border-radius:8px;overflow-x:auto}
  main blockquote{border-left:4px solid var(--accent);margin:1rem 0;padding:.2rem 1rem;color:var(--muted)}
  main table{border-collapse:collapse;width:100%;margin:1rem 0;display:block;overflow-x:auto}
  main th,main td{border:1px solid #334155;padding:.45rem .8rem;text-align:left;font-size:.95rem}
  main th{background:var(--panel);color:var(--accent)}
  main img{max-width:100%;background:#fff;border-radius:8px}
  main hr{border:none;border-top:1px solid #334155;margin:2rem 0}
  .err{background:#7f1d1d;border-radius:8px;padding:1rem 1.4rem}
  @media print{nav{display:none}body{background:#fff;color:#000}
    main h1,main h2,main a{color:#000}main th{color:#000;background:#eee}}
</style>
</head>
<body>
<nav>
  <a href="index.html">← Course home</a>
  <span id="path"></span>
</nav>
<main id="content"><p style="color:var(--muted)">Loading…</p></main>

<script src="resources/vendor/marked.min.js"></script>
<script src="resources/vendor/purify.min.js"></script>
<script>
(async function(){
  const el=document.getElementById('content');
  const file=new URLSearchParams(location.search).get('file')||'README.md';
  // same-repo relative .md paths only
  if(!/^[\w\-\/\.]+\.md$/.test(file)||file.includes('..')){
    el.innerHTML='<div class="err">Invalid document path.</div>';return;
  }
  document.getElementById('path').textContent=file;
  let text;
  try{
    const res=await fetch(file);
    if(!res.ok)throw new Error(res.status);
    text=await res.text();
  }catch(e){
    el.innerHTML='<div class="err">Could not load <b>'+file+'</b> ('+e.message+').</div>';return;
  }
  const m=text.match(/^#\s+(.+)$/m);
  if(m)document.title=m[1];
  if(window.marked&&window.DOMPurify){
    el.innerHTML=DOMPurify.sanitize(marked.parse(text));
    // give headings stable ids so #anchors work (e.g. quiz links)
    const slug=t=>t.toLowerCase().replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-');
    el.querySelectorAll('h1,h2,h3,h4').forEach(h=>{if(!h.id)h.id=slug(h.textContent);});
    // make relative .md links (with optional #anchor) open in the viewer too
    el.querySelectorAll('a[href]').forEach(a=>{
      const href=a.getAttribute('href');
      const m=href.match(/^(?!https?:)([\w\-\/\.]+\.md)(#[\w-]*)?$/);
      if(m)a.href='viewer.html?file='+m[1]+(m[2]||'');
    });
    if(location.hash){
      const t=document.getElementById(location.hash.slice(1));
      if(t)t.scrollIntoView();
    }
  }else{
    const pre=document.createElement('pre');pre.textContent=text;
    el.innerHTML='';el.appendChild(pre);
  }
})();
</script>
</body>
</html>
